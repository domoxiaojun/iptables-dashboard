services:
  iptables-dashboard:
    image: ghcr.io/domoxiaojun/iptables-dashboard:latest
    # 自托管端到端构建（需 clone 完整仓库），请注释掉上方 image: 并取消下方注释：
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile.allinone
    container_name: iptables-dashboard
    # network_mode: host is required because the container needs to manipulate
    # the host's netfilter tables, which live in the host network namespace.
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ipt-data:/var/lib/iptables-dashboard
      - ipt-config:/etc/iptables-dashboard
    environment:
      IPTD_LISTEN: 127.0.0.1:7642        # bind loopback only; reverse-proxy in front
      RUST_LOG: info
      # IPTD_BOOTSTRAP_USERNAME: admin
      # IPTD_BOOTSTRAP_PASSWORD: change-me-on-first-login
    restart: unless-stopped

volumes:
  ipt-data:
  ipt-config:
