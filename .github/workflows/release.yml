name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag override (e.g. v0.1.0)'
        required: false

permissions:
  contents: write
  packages: write

jobs:
  binary:
    name: Binary (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
          - target: aarch64-unknown-linux-musl
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.2 }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --no-frozen-lockfile
          pnpm build
      - name: Stage frontend into ipt-web/static
        run: |
          rm -rf crates/ipt-web/static
          cp -r frontend/dist crates/ipt-web/static
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.88'
          targets: ${{ matrix.target }}
      - uses: mlugg/setup-zig@v1
      - run: cargo install --locked cargo-zigbuild
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo zigbuild --release --target ${{ matrix.target }} --bin iptables-dashboard
      - name: Upload binary artifact (consumed by docker job)
        uses: actions/upload-artifact@v4
        with:
          name: iptables-dashboard-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/iptables-dashboard
          if-no-files-found: error
          retention-days: 1
      - name: Package release tarball
        run: |
          ver="${GITHUB_REF##*/}"
          dir="iptables-dashboard-${ver}-${{ matrix.target }}"
          mkdir "$dir"
          cp target/${{ matrix.target }}/release/iptables-dashboard "$dir/"
          cp deploy/systemd/iptables-dashboard.service "$dir/"
          cp docker/config.example.toml "$dir/"
          cp README.md LICENSE "$dir/"
          tar czf "${dir}.tar.gz" "$dir"
          sha256sum "${dir}.tar.gz" > "${dir}.tar.gz.sha256"
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            iptables-dashboard-*.tar.gz
            iptables-dashboard-*.tar.gz.sha256

  docker:
    name: Docker image (${{ matrix.arch }})
    needs: binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: iptables-dashboard-${{ matrix.arch }}
          path: docker/bin/
      - name: chmod binary
        run: chmod +x docker/bin/iptables-dashboard
      - name: Compute image coordinates
        id: img
        run: |
          repo_lc=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          ref="${GITHUB_REF##*/}"
          echo "image=ghcr.io/${repo_lc}" >> "$GITHUB_OUTPUT"
          echo "tag=${ref}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: true
          provenance: false
          tags: ${{ steps.img.outputs.image }}:${{ steps.img.outputs.tag }}-${{ matrix.arch }}

  manifest:
    name: Multi-arch manifest
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image coordinates
        id: img
        run: |
          repo_lc=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          ref="${GITHUB_REF##*/}"
          echo "image=ghcr.io/${repo_lc}" >> "$GITHUB_OUTPUT"
          echo "tag=${ref}" >> "$GITHUB_OUTPUT"
      - name: Create and push multi-arch manifest
        run: |
          src_amd64="${{ steps.img.outputs.image }}:${{ steps.img.outputs.tag }}-amd64"
          src_arm64="${{ steps.img.outputs.image }}:${{ steps.img.outputs.tag }}-arm64"
          for tag in "${{ steps.img.outputs.tag }}" latest; do
            docker buildx imagetools create \
              -t "${{ steps.img.outputs.image }}:${tag}" \
              "$src_amd64" "$src_arm64"
          done
